<!DOCTYPE html>
<html>
    <body>
        <div id = "root"></div>
    </body>
    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.28.5/babel.min.js"></script>
    <script type = "text/babel">
        const root = document.getElementById("root"); 
        let counter = 0; // 초기값: 0
        function countUp() { // countUp은 클릭 이벤트 발생 시 실행되는 이벤트 핸들러
            counter = counter + 1;
            render();
        }
        function render() {
            ReactDOM.render(<Container />, root); // Container를 리렌더링 => counter 값 변경 후 render() 호출로 화면 업데이트
        }
        const Container = () => ( // 화살표 함수로 작성
            <div>
                <h3>Total clicks: {counter}</h3>
                <button onClick={countUp}>Click me</button>  {/* onClick은 이벤트리스너, 버튼 클릭 시 countUp 함수 실행 */}
            </div>
        );
        /* 
        // Container은 함수형 컴포넌트여서 아래처럼 일반 함수로도 작성 가능

        function Container() {
            return (
                <div>
                    <h3>Total clicks: {counter}</h3>
                    <button onClick={countUp}>Click me</button> 
                </div>
            );
        }
        */
        render();
    </script>
</html>
